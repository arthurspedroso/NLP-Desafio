<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANEEL RAG</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            width: 700px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #1e3a8a;
        }

        textarea {
            width: 100%;
            height: 80px;
            padding: 10px;
            margin-top: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .response {
            margin-top: 20px;
            background: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            white-space: pre-wrap;
        }

        .sources {
            margin-top: 15px;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Consulta Inteligente ANEEL</h1>

        <textarea id="question" placeholder="Digite sua pergunta..."></textarea>
        <button onclick="askQuestion()">Perguntar</button>

        <div class="response" id="response">A resposta aparecerá aqui...</div>
        <div class="sources" id="sources"></div>
    </div>

    <script>
        async function askQuestion() {
            const question = document.getElementById("question").value;
            const responseBox = document.getElementById("response");
            const sourcesBox = document.getElementById("sources");

            responseBox.innerText = "Consultando...";
            sourcesBox.innerHTML = "";

            try {
                const res = await fetch("http://127.0.0.1:8000/ask", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ question })
                });

                const data = await res.json();

                responseBox.innerText = data.answer;

                if (data.sources && data.sources.length > 0) {
                    sourcesBox.innerHTML =
                        "<b>Fontes:</b><br>" +
                        data.sources.map(s =>
                            `• ${s.document} (score: ${s.distance.toFixed(4)})`
                        ).join("<br>");
                } else {
                    sourcesBox.innerHTML = "Sem fontes retornadas.";
                }

            } catch (error) {
                responseBox.innerText = "Erro ao consultar API.";
                console.error(error);
            }
        }
    </script>
</body>
</html>
