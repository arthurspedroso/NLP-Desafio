<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANEEL IA Assistant</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 800px;
            background: white;
            color: #111;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #1e3a8a;
            margin-bottom: 5px;
        }

        p.subtitle {
            text-align: center;
            color: #666;
            margin-top: 0;
        }

        textarea {
            width: 100%;
            height: 80px;
            padding: 12px;
            font-size: 16px;
            border-radius: 10px;
            border: 1px solid #ccc;
            resize: none;
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            background: #2563eb;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .examples {
            margin-top: 15px;
            font-size: 14px;
            color: #444;
        }

        .example-btn {
            display: inline-block;
            background: #eef2ff;
            color: #1e3a8a;
            padding: 6px 10px;
            margin: 4px;
            border-radius: 8px;
            cursor: pointer;
        }

        .response-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #f9fafb;
            min-height: 80px;
            white-space: pre-wrap;
        }

        .sources {
            margin-top: 15px;
            font-size: 14px;
            color: #555;
        }

        .loading {
            color: #2563eb;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Consulta Inteligente ANEEL</h1>
    <p class="subtitle">Pergunte sobre normas, resoluções e regulamentações</p>

    <textarea id="question" placeholder="Digite sua pergunta..."></textarea>
    <button onclick="askQuestion()">Perguntar</button>

    <div class="examples">
        Exemplos:
        <span class="example-btn" onclick="fillQuestion('O que é microgeração distribuída?')">Microgeração</span>
        <span class="example-btn" onclick="fillQuestion('Quais são as regras para conexão?')">Conexão</span>
        <span class="example-btn" onclick="fillQuestion('O que são bandeiras tarifárias?')">Bandeiras tarifárias</span>
    </div>

    <div class="response-box" id="response">A resposta aparecerá aqui...</div>
    <div class="sources" id="sources"></div>
</div>

<script>
    function fillQuestion(text) {
        document.getElementById("question").value = text;
    }

    async function askQuestion() {
        const question = document.getElementById("question").value;
        const responseBox = document.getElementById("response");
        const sourcesBox = document.getElementById("sources");

        responseBox.innerHTML = '<span class="loading">Consultando base da ANEEL...</span>';
        sourcesBox.innerHTML = "";

        try {
            const res = await fetch("http://127.0.0.1:8000/ask", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ question })
            });

            const data = await res.json();

            responseBox.innerText = data.answer || "Sem resposta.";

            if (data.sources && data.sources.length > 0) {
                sourcesBox.innerHTML = "<b>Fontes consultadas:</b><br>" +
                    data.sources
                        .filter(s => s.document !== "Documento desconhecido")
                        .map(s =>
                            `• ${s.document} (score: ${s.distance.toFixed(3)})`
                        ).join("<br>");
            }
        } catch (error) {
            responseBox.innerText = "Erro ao consultar API.";
            console.error(error);
        }
    }
</script>
</body>
</html>
